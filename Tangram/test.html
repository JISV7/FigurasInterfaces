<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tangram - 33 - Factory</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #ffffff; overflow: hidden; font-family: system-ui, sans-serif;
        }
        .scene { perspective: 1200px; }
        .tangram-board {
            width: 400px; height: 400px; position: relative;
            transform-style: preserve-3d; transform: translateZ(-900px);
            margin-left: -50px; margin-top: -50px;
        }
        svg { width: 100%; height: 100%; overflow: visible; }
        
        .piece {
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.5)) drop-shadow(4px 4px 8px rgba(0,0,0,0.2));
        }

        /* State Classes */
        .state-square .piece { animation: none; }
        .state-factory .piece { animation: none; }

        /* 
           Animations are driven by CSS classes toggled via JS.
           50% keyframes are intentionally left empty as requested.
        */
        @keyframes morph-l1 { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(267px, 0px) rotate(180deg); } }
        @keyframes morph-l2 { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(0px, 0px) rotate(0deg); } }
        @keyframes morph-s1 { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(0px, 133px) rotate(180deg); } }
        @keyframes morph-sq { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(0px, 0px) rotate(0deg); } }
        @keyframes morph-m  { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(-266.5px, 200px) rotate(-90deg); } }
        @keyframes morph-s2 { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(67px, -400px) rotate(180deg); } }
        @keyframes morph-p  { 0% { transform: translate(0px, 0px) rotate(0deg); } 50% {} 100% { transform: translate(0px, -300px) rotateX(180deg); } }

        .state-square .p-l1 { animation: morph-l1 2.5s ease-in-out forwards reverse; }
        .state-square .p-l2 { animation: morph-l2 2.5s ease-in-out forwards reverse; }
        .state-square .p-s1 { animation: morph-s1 2.5s ease-in-out forwards reverse; }
        .state-square .p-sq { animation: morph-sq 2.5s ease-in-out forwards reverse; }
        .state-square .p-m  { animation: morph-m  2.5s ease-in-out forwards reverse; }
        .state-square .p-s2 { animation: morph-s2 2.5s ease-in-out forwards reverse; }
        .state-square .p-p  { animation: morph-p  2.5s ease-in-out forwards reverse; }

        .state-factory .p-l1 { animation: morph-l1 2.5s ease-in-out forwards; }
        .state-factory .p-l2 { animation: morph-l2 2.5s ease-in-out forwards; }
        .state-factory .p-s1 { animation: morph-s1 2.5s ease-in-out forwards; }
        .state-factory .p-sq { animation: morph-sq 2.5s ease-in-out forwards; }
        .state-factory .p-m  { animation: morph-m  2.5s ease-in-out forwards; }
        .state-factory .p-s2 { animation: morph-s2 2.5s ease-in-out forwards; }
        .state-factory .p-p  { animation: morph-p  2.5s ease-in-out forwards; }
    </style>
</head>
<body>
    <div class="scene">
        <div class="tangram-board state-square" id="board">
            <svg viewBox="0 0 400 400" id="tangram-svg"></svg>
        </div>
    </div>

    <script>
        /**
         * TANGRAM MATH ENGINE
         * Defines pieces on a 4x4 logical grid (1 unit = 100px).
         * Automatically calculates centroids for accurate transform-origin.
         */
        const TANGRAM_DATA = [
            { id: 'l1', color: '#00cc7c', points: '0,0 0,400 200,200', cls: 'p-l1' },
            { id: 'l2', color: '#2583ef', points: '0,400 400,400 200,200', cls: 'p-l2' },
            { id: 's1', color: '#ec4654', points: '0,0 200,0 100,100', cls: 'p-s1' },
            { id: 'sq', color: '#fad405', points: '100,100 200,0 300,100 200,200', cls: 'p-sq' },
            { id: 'm',  color: '#ad43df', points: '200,0 400,0 400,200', cls: 'p-m' },
            { id: 's2', color: '#0fc8e6', points: '200,200 300,100 300,300', cls: 'p-s2' },
            { id: 'p',  color: '#fd8b01', points: '300,100 400,200 400,400 300,300', cls: 'p-p' }
        ];

        // Mathematical helper: Calculate polygon centroid
        function getCentroid(pointsStr) {
            const pts = pointsStr.trim().split(/\s+/).map(p => p.split(',').map(Number));
            let xSum = 0, ySum = 0;
            pts.forEach(([x, y]) => { xSum += x; ySum += y; });
            return { x: xSum / pts.length, y: ySum / pts.length };
        }

        const svg = document.getElementById('tangram-svg');
        const board = document.getElementById('board');

        // Generate SVG pieces and set transform-origin mathematically
        TANGRAM_DATA.forEach(piece => {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', `piece ${piece.cls}`);
            
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', piece.points);
            poly.setAttribute('fill', piece.color);
            
            const centroid = getCentroid(piece.points);
            // Set transform-origin to exact geometric center
            g.style.transformOrigin = `${centroid.x}px ${centroid.y}px`;
            
            g.appendChild(poly);
            svg.appendChild(g);
        });

        // Toggle between Square and Factory states
        let isFactory = false;
        document.body.addEventListener('click', () => {
            isFactory = !isFactory;
            board.classList.toggle('state-square', !isFactory);
            board.classList.toggle('state-factory', isFactory);
        });

        // Auto-play animation on load
        setTimeout(() => {
            isFactory = true;
            board.classList.replace('state-square', 'state-factory');
        }, 500);
    </script>
</body>
</html>
