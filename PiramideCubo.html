<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización 3D - Cubo con Tapa Piramidal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .controls-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            max-width: 280px;
        }

        button {
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .info-badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <div class="ui-overlay">
        <div class="controls-card">
            <h1 class="text-lg font-bold mb-2 text-gray-800">Cubo + Tapa Piramidal</h1>
            <p class="text-sm text-gray-600 mb-3">
                Cubo con hueco cuadrado central.
                Pirámide sólida como tapa que sobresale.
            </p>
            <span class="info-badge">✨ Dos piezas conectadas</span>

            <div class="flex flex-col gap-2 mt-4">
                <button onclick="setView('superior')"
                    class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded font-medium shadow-sm">
                    👁️ Vista Superior
                </button>
                <button onclick="setView('inferior')"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded font-medium shadow-sm">
                    👁️ Vista Inferior
                </button>
                <button onclick="resetView()"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-4 rounded font-medium">
                    🔄 Perspectiva Isométrica
                </button>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-200">
                <label class="text-xs font-bold text-gray-500 uppercase">Visualización</label>
                <div class="flex items-center mt-2">
                    <input type="checkbox" id="wireframeToggle" onchange="toggleWireframe(this)" class="mr-2">
                    <span class="text-sm text-gray-700">Modo Wireframe</span>
                </div>
                <div class="flex items-center mt-2">
                    <input type="checkbox" id="rotateToggle" onchange="toggleAutoRotate(this)" class="mr-2" checked>
                    <span class="text-sm text-gray-700">Rotación Automática</span>
                </div>
            </div>

            <div class="mt-3 text-xs text-gray-500">
                <strong>Dimensiones:</strong><br>
                • Cubo: 1.6 × 1.6 × 1.6<br>
                • Pirámide: base 2.0, altura 1.5<br>
                • Hueco: 0.9 × 0.9 (solo en cubo)
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, cubeGroup, pyramidGroup;
        let materials = [];
        let autoRotate = true;

        function init() {
            // Escena y Cámara
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x818cf8, 0.4);
            pointLight.position.set(-10, 5, -10);
            scene.add(pointLight);

            // Crear las dos piezas
            createCubeWithHole();
            createSolidPyramid();

            // Plano de referencia sutil
            const gridHelper = new THREE.GridHelper(10, 20, 0xe2e8f0, 0xf1f5f9);
            gridHelper.position.y = -3;
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createCubeWithHole() {
            cubeGroup = new THREE.Group();

            // Material para el cubo
            const cubeMat = new THREE.MeshPhongMaterial({
                color: 0xe54f46,
                side: THREE.DoubleSide,
                flatShading: true,
                transparent: true,
                opacity: 0.92,
                shininess: 30
            });
            materials.push(cubeMat);

            // Parámetros del cubo (más pequeño)
            const cubeSize = 1.6;
            const holeSize = 0.9; // Hueco cuadrado

            // 1. Paredes exteriores del cubo
            const wallThickness = 0.02;
            const walls = [
                // Frente y atrás
                { pos: [0, 0, cubeSize / 2], rot: [0, 0, 0], size: [cubeSize, cubeSize] },
                { pos: [0, 0, -cubeSize / 2], rot: [0, Math.PI, 0], size: [cubeSize, cubeSize] },
                // Lados
                { pos: [cubeSize / 2, 0, 0], rot: [0, Math.PI / 2, 0], size: [cubeSize, cubeSize] },
                { pos: [-cubeSize / 2, 0, 0], rot: [0, -Math.PI / 2, 0], size: [cubeSize, cubeSize] },
            ];

            walls.forEach(w => {
                const geo = new THREE.PlaneGeometry(w.size[0], w.size[1]);
                const mesh = new THREE.Mesh(geo, cubeMat);
                mesh.position.set(...w.pos);
                mesh.rotation.set(...w.rot);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                cubeGroup.add(mesh);
            });

            // 2. Tapas superior e inferior (con hueco)
            const createLiddedFace = (yPos, hasHole) => {
                const shape = new THREE.Shape();
                shape.moveTo(-cubeSize / 2, -cubeSize / 2);
                shape.lineTo(cubeSize / 2, -cubeSize / 2);
                shape.lineTo(cubeSize / 2, cubeSize / 2);
                shape.lineTo(-cubeSize / 2, cubeSize / 2);
                shape.lineTo(-cubeSize / 2, -cubeSize / 2);

                if (hasHole) {
                    const hole = new THREE.Path();
                    hole.moveTo(-holeSize / 2, -holeSize / 2);
                    hole.lineTo(holeSize / 2, -holeSize / 2);
                    hole.lineTo(holeSize / 2, holeSize / 2);
                    hole.lineTo(-holeSize / 2, holeSize / 2);
                    hole.lineTo(-holeSize / 2, -holeSize / 2);
                    shape.holes.push(hole);
                }

                const geo = new THREE.ShapeGeometry(shape);
                const mesh = new THREE.Mesh(geo, cubeMat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.y = yPos;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                return mesh;
            };

            // Tapa superior del cubo (con hueco) - donde se asienta la pirámide
            cubeGroup.add(createLiddedFace(cubeSize / 2, true));
            // Tapa inferior del cubo (con hueco)
            cubeGroup.add(createLiddedFace(-cubeSize / 2, true));

            // 3. Hueco cuadrado interior (solo en el volumen del cubo)
            const holeShape = new THREE.Shape();
            holeShape.moveTo(-holeSize / 2, -holeSize / 2);
            holeShape.lineTo(holeSize / 2, -holeSize / 2);
            holeShape.lineTo(holeSize / 2, holeSize / 2);
            holeShape.lineTo(-holeSize / 2, holeSize / 2);
            holeShape.lineTo(-holeSize / 2, -holeSize / 2);

            const extrudeSettings = {
                depth: cubeSize,
                bevelEnabled: false,
                curveSegments: 1
            };
            const holeGeo = new THREE.ExtrudeGeometry(holeShape, extrudeSettings);
            const holeMat = new THREE.MeshPhongMaterial({
                color: 0x1e293b,
                side: THREE.BackSide,
                transparent: true,
                opacity: 0.3
            });
            const holeMesh = new THREE.Mesh(holeGeo, holeMat);
            holeMesh.rotation.x = Math.PI / 2;

            // Posicionar el cubo: su centro en y=0, así va de -0.8 a +0.8
            cubeGroup.position.y = 0;

            scene.add(cubeGroup);
        }

        function createSolidPyramid() {
            pyramidGroup = new THREE.Group();

            // Material para la pirámide (ligeramente diferente para distinguirla)
            const pyramidMat = new THREE.MeshPhongMaterial({
                color: 0x6366f1,
                side: THREE.DoubleSide,
                flatShading: true,
                transparent: true,
                opacity: 0.95,
                shininess: 50
            });
            materials.push(pyramidMat);

            // Parámetros de la pirámide (más grande que el cubo para que sobresalga)
            const pyramidBase = 2.0;  // Base más grande que el cubo (1.6)
            const pyramidHeight = 1.5;

            // 1. Base de la pirámide (cuadrada, sólida - SIN hueco)
            const baseShape = new THREE.Shape();
            baseShape.moveTo(-pyramidBase / 2, -pyramidBase / 2);
            baseShape.lineTo(pyramidBase / 2, -pyramidBase / 2);
            baseShape.lineTo(pyramidBase / 2, pyramidBase / 2);
            baseShape.lineTo(-pyramidBase / 2, pyramidBase / 2);
            baseShape.lineTo(-pyramidBase / 2, -pyramidBase / 2);

            const baseGeo = new THREE.ShapeGeometry(baseShape);
            const baseMesh = new THREE.Mesh(baseGeo, pyramidMat);
            baseMesh.rotation.x = -Math.PI / 2;
            baseMesh.position.y = 0; // Base de la pirámide en y=0 (misma altura que tope del cubo)
            baseMesh.castShadow = true;
            baseMesh.receiveShadow = true;
            pyramidGroup.add(baseMesh);

            // 2. Cuatro caras triangulares de la pirámide
            const ptsBase = [
                new THREE.Vector3(-pyramidBase / 2, 0, pyramidBase / 2),
                new THREE.Vector3(pyramidBase / 2, 0, pyramidBase / 2),
                new THREE.Vector3(pyramidBase / 2, 0, -pyramidBase / 2),
                new THREE.Vector3(-pyramidBase / 2, 0, -pyramidBase / 2)
            ];
            const apex = new THREE.Vector3(0, -pyramidHeight, 0); // Ápice hacia arriba

            for (let i = 0; i < 4; i++) {
                const next = (i + 1) % 4;
                const faceGeo = new THREE.BufferGeometry();
                const vertices = new Float32Array([
                    ptsBase[i].x, ptsBase[i].y, ptsBase[i].z,
                    ptsBase[next].x, ptsBase[next].y, ptsBase[next].z,
                    apex.x, apex.y, apex.z
                ]);
                faceGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                faceGeo.computeVertexNormals();

                const faceMesh = new THREE.Mesh(faceGeo, pyramidMat);
                faceMesh.castShadow = true;
                faceMesh.receiveShadow = true;
                pyramidGroup.add(faceMesh);
            }

            // Posicionar la pirámide: su base en la parte superior del cubo
            // Cubo va de -0.8 a +0.8 en Y, así que colocamos la pirámide en y = 0.8
            pyramidGroup.position.y = 0.8; // cubeSize/2 = 1.6/2 = 0.8

            scene.add(pyramidGroup);
        }

        function setView(type) {
            const duration = 500;
            const startPos = camera.position.clone();
            let endPos;

            if (type === 'superior') {
                endPos = new THREE.Vector3(0.1, 8, 0.1);
            } else if (type === 'inferior') {
                endPos = new THREE.Vector3(0.1, -8, 0.1);
            }

            if (endPos) {
                // Animación simple de transición
                const steps = 30;
                let step = 0;
                const animateTransition = () => {
                    step++;
                    const t = step / steps;
                    camera.position.lerpVectors(startPos, endPos, t);
                    controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.1);
                    if (step < steps) {
                        requestAnimationFrame(animateTransition);
                    }
                    controls.update();
                };
                animateTransition();
            }
        }

        function resetView() {
            camera.position.set(5, 5, 5);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        function toggleWireframe(el) {
            materials.forEach(m => m.wireframe = el.checked);
        }

        function toggleAutoRotate(el) {
            autoRotate = el.checked;
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.5;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotación suave del objeto completo si está activada
            if (autoRotate && !controls.isDragging) {
                cubeGroup.rotation.y += 0.002;
                pyramidGroup.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        // Inicializar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
